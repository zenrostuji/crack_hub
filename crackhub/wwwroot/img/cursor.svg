<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for main cursor -->
    <linearGradient id="cursorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cursor shadow -->
  <path d="M4 2 L4 22 L10 16 L14 24 L17 23 L13 15 L20 15 Z" 
        fill="rgba(0,0,0,0.2)" 
        transform="translate(2,2)"/>
  
  <!-- Main cursor body -->
  <path d="M4 2 L4 22 L10 16 L14 24 L17 23 L13 15 L20 15 Z" 
        fill="url(#cursorGradient)" 
        filter="url(#glow)"
        stroke="#FFFFFF" 
        stroke-width="1"/>
  
  <!-- Highlight on cursor -->
  <path d="M6 4 L6 18 L9 15 L11 20 L12.5 19.5 L10.5 14.5 L16 14.5 Z" 
        fill="rgba(255,255,255,0.3)"/>
  
  <!-- Inner highlight -->
  <path d="M7 6 L7 15 L9 13 L10 16 L11 15.5 L10 12.5 L14 12.5 Z" 
        fill="rgba(255,255,255,0.2)"/>
</svg>
